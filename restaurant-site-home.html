<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emile's Restaurant Website/home</title>

    <style>
        #heading {
            background-color: orange;
        }

        #main_h1 {
            text-align: center;
            font-size: 365%;
            padding: 10px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #menu-types-buttons {
            overflow-x: auto;
            white-space: nowrap;
            text-align: center;
            background-color: orange;
            padding: 10px;
            margin: auto;
        }

        .types {
            height: 70px;
            width: 230px;
            margin: 4px;
            font-size: 35px;
            border: 5px solid rgb(31, 31, 31);
            background-color: black;
            color: orange;
        }

        @media (max-width: 900px) {
            #main_h1 {
                font-size: 220%;
            }

            .types {
                height: 40px;
                width: 200px;
                font-size: 20px;
            }
        }
        
    </style>
</head>
<body style="background-color: rgb(38, 38, 38);">
    <div id="heading">
        <h1 id="main_h1"><b><U>Emile's Restaurant Website</U></b></h1>
    </div>
    
    <div id="menu-types-buttons">
        <button id="plates" class="types">Plates</button>
        <button id="Sandwitches" class="types">Sandwitches</button>
        <button id="deals" class="types">Deals</button>
        <button id="drinks" class="types">Drinks</button>
        <button id="deserts" class="types">Deserts</button>
    </div>
</body>
</html>
