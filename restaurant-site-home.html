<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emile's Restaurant Website/home</title>

    <style>
        body {
            background-color: rgb(38, 38, 38);
            margin: 0;
        }

        #heading {
            background-color: orange;
        }

        #main_h1 {
            text-align: center;
            font-size: 365%;
            padding: 10px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #menu-types-buttons {
            overflow-x: auto;
            white-space: nowrap;
            text-align: center;
            background-color: orange;
            padding: 10px;
            margin: auto;
        }

        h2 {
            color: orange;
        }

        .types {
            height: 70px;
            width: 230px;
            margin: 4px;
            font-size: 35px;
            border: 5px solid rgb(31, 31, 31);
            background-color: black;
            color: orange;
        }

        .types-divs {
            display: none;
            color: white;
            padding: 20px;
        }

        #home-div {
            display: block;
        }

        #home-div {
            display: flex;
        }

        #resto-exterior-img {
            width: 455px;
            height: auto;
            border: 3px solid rgb(45, 45, 45);
        }

        .content {
            margin-left: 20px;
            font-size: large;
        }

        .separator {
            width: 3px;
            background-color: orange;
            margin: 0 20px;
        }

        @media (max-width: 900px) {
            #main_h1 {
                font-size: 220%;
            }

            .types {
                height: 40px;
                width: 200px;
                font-size: 20px;
            }

            .content  {
                margin-left: 1px;
            }

            #home-div {
                flex-direction: column;
            }

            #resto-exterior-img {
                height: 100%;
                width: 70%;
            }

            .separator {
                display: none;
            }
        }
    </style>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            let home = document.getElementById("home-div");
            let plates = document.getElementById("plates-div");
            let sandwiches = document.getElementById("sandwitches-div");
            let deals = document.getElementById("deals-div");
            let drinks = document.getElementById("drinks-div");
            let deserts = document.getElementById("deserts-div");

            function hideAll() {
                home.style.display = "none";
                plates.style.display = "none";
                sandwiches.style.display = "none";
                deals.style.display = "none";
                drinks.style.display = "none";
                deserts.style.display = "none";
            }

            document.getElementById("home").onclick = function () {
                hideAll();
                home.style.display = "flex";
            };

            document.getElementById("plates").onclick = function () {
                hideAll();
                plates.style.display = "flex";
            };

            document.getElementById("Sandwiches").onclick = function () {
                hideAll();
                sandwiches.style.display = "flex";
            };

            document.getElementById("deals").onclick = function () {
                hideAll();
                deals.style.display = "flex";
            };

            document.getElementById("drinks").onclick = function () {
                hideAll();
                drinks.style.display = "flex";
            };

            document.getElementById("deserts").onclick = function () {
                hideAll();
                deserts.style.display = "flex";
            };
        });
    </script>
</head>

<body>
    <div id="heading">
        <h1 id="main_h1"><b><u>Emile's Restaurant Website</u></b></h1>
    </div>

    <div id="menu-types-buttons">
        <button id="home" class="types">Home</button>
        <button id="plates" class="types">Plates</button>
        <button id="Sandwiches" class="types">Sandwiches</button>
        <button id="deals" class="types">Deals</button>
        <button id="drinks" class="types">Drinks</button>
        <button id="deserts" class="types">Deserts</button>
    </div>

    <div id="home-div" class="types-divs">
        <img src="restaurant-exterior.jpg" alt="restaurant image" id="resto-exterior-img">

        <div class="content">
            <h2><u>Opening Dates/Opening Time:</u></h2>
            <ul>
                <li>Monday => Saturday</li>
                <li>12pm => 10pm</li>
            </ul>

            <h2><U>Reservation:</U></h2>
            <ul>
                <li>Number: ## ### ###</li>
                <li>Reservation fee (inside): 5$</li>
                <li>Reservation fee (outside): 8$</li>
            </ul>
        </div>

        <div class="separator"></div>

        <div class="content">
            <h2><u>Social Media:</u></h2>
            <ul>
                <li>Facebook:<br>@Emiles-restaurant</li>
                <li>instagram:<br>@Emiles-resto11</li>
            </ul>
        </div>
    </div>

    <div id="plates-div" class="types-divs">
        2
    </div>

    <div id="sandwitches-div" class="types-divs">
        3
    </div>

    <div id="deals-div" class="types-divs">
        4
    </div>

    <div id="drinks-div" class="types-divs">
        5
    </div>

    <div id="deserts-div" class="types-divs">
        6
    </div>
</body>
</html>
